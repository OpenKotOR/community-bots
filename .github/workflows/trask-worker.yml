name: Deploy Trask Worker

on:
  push:
    branches:
      - main
    paths:
      - "infra/trask-worker/**"
      - ".github/workflows/trask-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trask-worker
  cancel-in-progress: true

jobs:
  verify-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild esbuild binary
        run: pnpm rebuild esbuild

      - name: Build worker bundle
        run: pnpm --dir infra/trask-worker run build

      - name: Wrangler dry-run (free workers.dev target)
        env:
          TRASK_WEB_ALLOW_ANONYMOUS: "1"
          TRASK_RESEARCHWIZARD_BASE_URL: https://example.com
        run: pnpm dlx wrangler@4.87.0 deploy --config infra/trask-worker/wrangler.toml --dry-run --var "TRASK_WEB_ALLOW_ANONYMOUS:${TRASK_WEB_ALLOW_ANONYMOUS}" --var "TRASK_RESEARCHWIZARD_BASE_URL:${TRASK_RESEARCHWIZARD_BASE_URL}"

  deploy:
    needs: verify-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare deploy inputs
        id: cf_check
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRASK_RESEARCHWIZARD_BASE_URL: ${{ vars.TRASK_RESEARCHWIZARD_BASE_URL }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets."
            exit 0
          fi
          if [ -z "$TRASK_RESEARCHWIZARD_BASE_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy. Set repository variable TRASK_RESEARCHWIZARD_BASE_URL."
            exit 0
          fi
          if [[ "$TRASK_RESEARCHWIZARD_BASE_URL" == *"example.com"* ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy. Replace placeholder TRASK_RESEARCHWIZARD_BASE_URL with a real Trask HTTP origin."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cf_check.outputs.configured == 'true'
        uses: actions/checkout@v6

      - name: Setup Node
        if: steps.cf_check.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        if: steps.cf_check.outputs.configured == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install dependencies
        if: steps.cf_check.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Rebuild esbuild binary
        if: steps.cf_check.outputs.configured == 'true'
        run: pnpm rebuild esbuild

      - name: Build worker bundle
        if: steps.cf_check.outputs.configured == 'true'
        run: pnpm --dir infra/trask-worker run build

      - name: Set worker secret TRASK_RESEARCHWIZARD_API_KEY (optional)
        if: steps.cf_check.outputs.configured == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRASK_RESEARCHWIZARD_API_KEY: ${{ secrets.TRASK_RESEARCHWIZARD_API_KEY }}
        run: |
          if [ -n "$TRASK_RESEARCHWIZARD_API_KEY" ]; then
            echo -n "$TRASK_RESEARCHWIZARD_API_KEY" | pnpm dlx wrangler@4.87.0 secret put TRASK_RESEARCHWIZARD_API_KEY --config infra/trask-worker/wrangler.toml
          else
            echo "Skipping TRASK_RESEARCHWIZARD_API_KEY sync (secret not set)."
          fi

      - name: Set worker secret TRASK_WEB_API_KEY (optional)
        if: steps.cf_check.outputs.configured == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRASK_WEB_API_KEY: ${{ secrets.TRASK_WEB_API_KEY }}
        run: |
          if [ -n "$TRASK_WEB_API_KEY" ]; then
            echo -n "$TRASK_WEB_API_KEY" | pnpm dlx wrangler@4.87.0 secret put TRASK_WEB_API_KEY --config infra/trask-worker/wrangler.toml
          else
            echo "Skipping TRASK_WEB_API_KEY sync (secret not set)."
          fi

      - name: Deploy Trask worker to workers.dev (free)
        if: steps.cf_check.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRASK_RESEARCHWIZARD_BASE_URL: ${{ vars.TRASK_RESEARCHWIZARD_BASE_URL }}
          TRASK_WEB_ALLOW_ANONYMOUS: ${{ vars.TRASK_WEB_ALLOW_ANONYMOUS != '' && vars.TRASK_WEB_ALLOW_ANONYMOUS || '1' }}
        run: pnpm dlx wrangler@4.87.0 deploy --config infra/trask-worker/wrangler.toml --var "TRASK_WEB_ALLOW_ANONYMOUS:${TRASK_WEB_ALLOW_ANONYMOUS}" --var "TRASK_RESEARCHWIZARD_BASE_URL:${TRASK_RESEARCHWIZARD_BASE_URL}"
