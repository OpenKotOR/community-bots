name: Docker Builds CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-builds.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-builds.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS_SUBMODULES_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and verify service images
        run: |
          set -euo pipefail

          declare -A SERVICE_DOCKERFILES=(
            [pazaak-bot]="apps/pazaak-bot/Dockerfile"
            [trask-bot]="apps/trask-bot/Dockerfile"
            [hk-bot]="apps/hk-bot/Dockerfile"
            [trask-http-server]="apps/trask-http-server/Dockerfile"
            [ingest-worker]="apps/ingest-worker/Dockerfile"
          )

          for service in "${!SERVICE_DOCKERFILES[@]}"; do
            image="${service}-service:test"
            dockerfile="${SERVICE_DOCKERFILES[$service]}"
            echo "Building $service with $dockerfile"
            docker buildx build --load --progress=plain -f "$dockerfile" -t "$image" .
            docker image inspect "$image" >/dev/null
            echo "OK: $service image built"
          done

      - name: Build and smoke test web images
        run: |
          set -euo pipefail

          declare -A WEB_DOCKERFILES=(
            [pazaak-world]="apps/pazaak-world/Dockerfile"
            [holocron-web]="apps/holocron-web/Dockerfile"
            [hk86-web]="apps/hk86-web/Dockerfile"
          )

          declare -A WEB_PORTS=(
            [pazaak-world]=5173
            [holocron-web]=5174
            [hk86-web]=5175
          )

          for app in pazaak-world holocron-web hk86-web; do
            image="${app}-preview:test"
            dockerfile="${WEB_DOCKERFILES[$app]}"
            port="${WEB_PORTS[$app]}"
            container="${app}-ci-test"

            echo "Building $app with $dockerfile"
            docker buildx build --load --progress=plain -f "$dockerfile" -t "$image" .
            docker image inspect "$image" >/dev/null

            echo "Smoke testing $app on port $port"
            docker run --rm -d --name "$container" -e PORT="$port" -p "$port:$port" "$image"
            sleep 5
            if docker logs "$container" | grep -E "Local:|Network:|listening|started|ready" >/dev/null; then
              echo "OK: $app started successfully"
            else
              echo "ERROR: $app did not show expected startup output"
              docker logs "$container" || true
              docker kill "$container" || true
              exit 1
            fi
            docker kill "$container" || true
          done

      - name: Build and verify Nakama module image
        run: |
          set -euo pipefail

          image="pazaak-nakama-builder:test"
          docker buildx build --load --progress=plain -f apps/pazaak-nakama/Dockerfile -t "$image" .
          docker image inspect "$image" >/dev/null
          docker run --rm "$image" ls -lh /app/dist
          echo "OK: Nakama module bundle verified"

      - name: CI summary
        run: echo "All Docker build and smoke tests passed"
