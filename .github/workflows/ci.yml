name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild esbuild native binary
        run: pnpm rebuild esbuild

      - name: TypeScript build
        run: pnpm build

      - name: Type check
        run: pnpm check

      - name: Lint (pazaak-world)
        run: pnpm --filter pazaak-world lint

      - name: Unit tests
        run: node --test packages/*/dist/*.test.js apps/*/dist/*.test.js

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: Holocron functional e2e (live Trask research in browser)
        run: pnpm holocron:e2e
        env:
          TRASK_WEB_ALLOW_ANONYMOUS: "1"
