name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild esbuild native binary
        run: pnpm rebuild esbuild

      - name: TypeScript build
        run: pnpm build

      - name: Type check
        run: pnpm check

      - name: Lint (pazaak-world)
        run: pnpm --filter pazaak-world lint

      - name: Unit tests
        run: node --test packages/*/dist/*.test.js apps/*/dist/*.test.js

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: Bootstrap Trask indexer venv
        run: bash scripts/bootstrap_trask_indexer.sh

      - name: Seed Chroma golden fixtures for Holocron e2e
        run: .venv-trask-indexer/bin/python scripts/smoke_trask_indexed_stack.py --golden-fixtures --verify-retrieve
        env:
          TRASK_INDEXER_DATA_DIR: data/trask-indexer

      - name: Start Trask indexer (background)
        run: |
          .venv-trask-indexer/bin/trask-indexer serve &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8790/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Indexer failed to start" >&2
          exit 1

      - name: Holocron functional e2e (live Trask research in browser)
        run: pnpm holocron:e2e
        env:
          TRASK_WEB_ALLOW_ANONYMOUS: "1"
          TRASK_INDEXER_BASE_URL: http://127.0.0.1:8790
          TRASK_WEB_RESEARCH_PYTHON: .venv-trask-indexer/bin/python
